project:
  type: website
  output-dir: docs
  pre-render:
    - _data/generate_publications.R
    - _data/generate_team.R
    - _data/generate_resources.R

website:
  title: "CSDisseminate"
  favicon: /Images/favicon-96x96.png
  navbar:
    title: "
  ![](/Images/CSDisseminate Logo_White Logo_Purple Background Circle.png){width=45 fig-alt=\"\"}
  \\ \\
  CSDisseminate"
    right:
      - text: "Home"
        href: index.qmd
      - text: "People"
        menu:
          - text: "Meet the Team"
            href: team.qmd
          - text: "Join Us"
            href: join-us.qmd
          - text: "Featured Scientists"
            href: featured-scientists.qmd
      - text: "Research"
        href: Research/index.qmd
      - text: "Resources"
        href: resources.qmd
      - text: "Events"
        href: events.qmd
      - text: "Support"
        href: support.qmd
  back-to-top-navigation: true
  page-footer:
    left:
      # These were icon-only links with no accessible name (screen readers announced
      # just "link"). Quarto's footer renderer ignores `aria-label`, and supplying
      # `text` replaces `icon` — so the icon is written out here by hand, marked
      # decorative, alongside a visually-hidden label that names the link.
      - text: "<i class='bi bi-github' aria-hidden='true'></i><span class='visually-hidden'>CSDisseminate on GitHub</span>"
        href: https://github.com/CSDisseminate
      - text: "<i class='bi bi-instagram' aria-hidden='true'></i><span class='visually-hidden'>CSDisseminate on Instagram</span>"
        href: https://www.instagram.com/csdisseminate

format:
  html:
    theme:
      light:
        - cosmo
        - styles/cosmo-custom.scss
      dark:
        - solar
        - styles/solar-custom.scss
    css: /styles.css
    toc: true
    metadata:
      pagetitle: "CSDisseminate"
    include-after-body: custom-footer.html

editor: visual

